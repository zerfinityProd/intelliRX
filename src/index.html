<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>IntelliRX - Patient Management</title>
  <meta name="description" content="IntelliRX — a fast, secure patient management system for healthcare professionals.">
  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">

  <link rel="canonical" href="https://intellirx.app/">
  <link rel="alternate" hreflang="en" href="https://intellirx.app/">

  <!-- Preconnect to 4 most critical origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
  <!-- Firebase Auth iframe — on critical path, preconnect reduces auth/iframe.js delay -->
  <link rel="preconnect" href="https://intellirx-test.firebaseapp.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.googleapis.com">

  <!-- Basic security meta tags (CSP must be set as HTTP header on server, not meta) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="geolocation=(), camera=(), microphone=()">

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "IntelliRX",
    "description": "Patient management system for healthcare professionals",
    "applicationCategory": "HealthApplication",
    "operatingSystem": "Web"
  }
  </script>

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0D9488">
  <link rel="apple-touch-icon" href="icon-192x192.png">

  <!-- Google Fonts: non-blocking -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
  </noscript>
</head>

<body>
  <app-root></app-root>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>

</html>
