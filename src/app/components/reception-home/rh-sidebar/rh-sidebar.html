<!-- ═══ RIGHT: Sidebar ═══ -->
<div class="rh-sidebar">

  <!-- Calendar -->
  <div class="rh-widget">
    <div class="rh-widget__header">
      <div class="rh-widget__header-left">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        Calendar
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="rh-cal-nav" (click)="prevMonthClicked.emit()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <span class="rh-cal-label">{{ calMonthLabel }}</span>
        <button class="rh-cal-nav" (click)="nextMonthClicked.emit()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
    </div>

    <div class="rh-cal-grid" style="margin-bottom:4px">
      <div *ngFor="let d of ['S','M','T','W','T','F','S']" class="rh-cal-dh">{{ d }}</div>
    </div>
    <div class="rh-cal-grid">
      <ng-container *ngFor="let day of calendarDays">
        <div *ngIf="!day" class="rh-cal-cell rh-cal-cell--empty"></div>
        <div *ngIf="day" class="rh-cal-cell"
          [class.rh-cal-cell--today]="isToday(day)"
          [class.rh-cal-cell--selected]="isCalSelected(day)"
          [class.rh-cal-cell--has-appts]="appointmentsOnDate(day).length > 0 && !isToday(day) && !isCalSelected(day)"
          (click)="calDayClicked.emit(day)"
          [title]="appointmentsOnDate(day).length + ' appointment(s)'">
          <span class="rh-cal-num">{{ day.getDate() }}</span>
          <span *ngIf="appointmentsOnDate(day).length > 0" class="rh-cal-dot"
            [style.background]="isToday(day)||isCalSelected(day) ? 'rgba(255,255,255,0.85)' : '#1CB5C9'"></span>
        </div>
      </ng-container>
    </div>
    <div class="rh-cal-legend">
      <span style="display:flex;align-items:center;gap:4px">
        <span style="width:8px;height:8px;border-radius:50%;background:#148D9E;flex-shrink:0"></span> Today
      </span>
      <span style="display:flex;align-items:center;gap:4px">
        <span style="width:8px;height:8px;border-radius:50%;background:#1CB5C9;flex-shrink:0"></span> Appointments
      </span>
    </div>
  </div>

  <!-- Today's Quick Stats -->
  <div class="rh-stats-row">
    <div class="rh-stat rh-stat--scheduled">
      <div class="rh-stat__num">{{ scheduledCount }}</div>
      <div class="rh-stat__label">Scheduled</div>
    </div>
    <div class="rh-stat rh-stat--completed">
      <div class="rh-stat__num">{{ completedTodayCount }}</div>
      <div class="rh-stat__label">Completed</div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="rh-widget">
    <div class="rh-widget__header">
      <div class="rh-widget__header-left">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        Quick Actions
      </div>
    </div>
    <div class="rh-qa-grid">
      <button class="rh-qa-btn rh-qa-btn--book" (click)="bookNewClicked.emit()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>Book Appointment</span>
      </button>
      <button class="rh-qa-btn rh-qa-btn--today" (click)="goTodayClicked.emit()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span>Today's View</span>
      </button>
    </div>
  </div>

</div><!-- /rh-sidebar -->
