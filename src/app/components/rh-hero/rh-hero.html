<!-- ── Hero Banner ── -->
<div class="rh-hero">
  <div class="rh-hero__left">
    <div class="rh-hero__icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    </div>
    <div>
      <h1 class="rh-hero__title">{{ greeting }}, {{ userName }}!</h1>
      <p class="rh-hero__sub">
        <span *ngIf="!isLoading">{{ todayCount }} appointments today · {{ scheduledCount }} scheduled · {{ completedTodayCount }} completed</span>
        <span *ngIf="isLoading">Loading today's schedule...</span>
      </p>
    </div>
  </div>
  <button class="rh-hero__cta" (click)="bookNewClicked.emit()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
    Book Appointment
  </button>
</div>
