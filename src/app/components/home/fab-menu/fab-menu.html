<!-- ── FAB backdrop ── -->
<div *ngIf="isFabOpen"
  class="fab-backdrop"
  (click)="toggleFabClicked.emit()"
  aria-hidden="true">
</div>

<!-- ── Floating Action Button ── -->
<div class="fab-container" role="region" aria-label="Quick actions">
  <div class="fab-options" [class.fab-options--visible]="isFabOpen"
    [attr.aria-hidden]="!isFabOpen">

    <div *ngIf="permissions.canAppointment" class="fab-option-row">
      <span class="fab-label" aria-hidden="true">Appointment</span>
      <button class="fab-option-btn fab-visit-btn" (click)="addAppointmentClicked.emit()" aria-label="Book appointment"
        [attr.tabindex]="isFabOpen ? 0 : -1">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
      </button>
    </div>

    <div class="fab-option-row">
      <span class="fab-label" aria-hidden="true">New Patient</span>
      <button *ngIf="permissions.canAddPatient" class="fab-option-btn fab-patient-btn" (click)="addPatientClicked.emit()" aria-label="Add new patient"
        [attr.tabindex]="isFabOpen ? 0 : -1">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <line x1="19" y1="8" x2="19" y2="14"></line>
          <line x1="22" y1="11" x2="16" y2="11"></line>
        </svg>
      </button>
    </div>

  </div>

  <button class="fab-main-btn" (click)="toggleFabClicked.emit()" [class.fab-main-btn--open]="isFabOpen"
    [attr.aria-label]="isFabOpen ? 'Close actions menu' : 'Open actions menu'"
    [attr.aria-expanded]="isFabOpen">
    <svg class="fab-icon fab-icon--plus" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
    <svg class="fab-icon fab-icon--close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
</div>
