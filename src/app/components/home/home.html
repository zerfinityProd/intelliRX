<!-- ── Navbar ── -->
<app-navbar></app-navbar>

<!-- ── Kanban Home Layout ── -->
<div class="kanban-home" (click)="onPageClick($event)">

  <!-- LEFT COLUMN — Search Panel (child component) -->
  <app-search-panel
    [searchTerm]="searchTerm"
    [searchResults]="searchResults"
    [isSearching]="isSearching"
    [errorMessage]="errorMessage"
    [hasMoreResults]="hasMoreResults"
    [isLoadingMore]="isLoadingMore"
    [permissions]="permissions"
    (searchTermChange)="searchTerm = $event"
    (searchInputChanged)="onSearchInput()"
    (clearSearchClicked)="clearSearch()"
    (loadMoreClicked)="loadMoreResults()"
    (addPatientClicked)="openAddPatientForm()"
    (viewPatientClicked)="viewPatientDetails($event)"
    (addVisitClicked)="openAddVisitForm($event)"
    (addAppointmentClicked)="openAddAppointmentForm($event)">
  </app-search-panel>

  <!-- RIGHT COLUMN — Widgets Panel (child component) -->
  <app-widgets-panel
    [todayAppointmentCount]="todayAppointmentCount"
    [isLoadingAppts]="isLoadingAppts"
    [selectedDashboardDoctor]="selectedDashboardDoctor"
    [userRole]="userRole"
    [doctorContextReady]="doctorContextReady"
    [doctorClinics]="doctorClinics"
    [selectedDoctorClinicId]="selectedDoctorClinicId"
    [dashboardDoctors]="dashboardDoctors"
    [selectedDashboardDoctorId]="selectedDashboardDoctorId"
    [dashboardClinics]="dashboardClinics"
    [selectedDashboardClinicId]="selectedDashboardClinicId"
    [calendarMonthLabel]="calendarMonthLabel"
    [calendarDays]="calendarDays"
    [selectedDate]="selectedDate"
    [appointments]="appointments"
    [permissions]="permissions"
    (selectedDoctorClinicIdChange)="selectedDoctorClinicId = $event"
    (doctorClinicChanged)="onDoctorClinicChange()"
    (selectedDashboardClinicIdChange)="selectedDashboardClinicId = $event"
    (dashboardClinicChanged)="onDashboardClinicChange()"
    (selectedDashboardDoctorIdChange)="selectedDashboardDoctorId = $event"
    (dashboardDoctorChanged)="onDashboardDoctorChange()"
    (dayClicked)="onDayClick($event)"
    (prevMonthClicked)="prevMonth()"
    (nextMonthClicked)="nextMonth()"
    (goToAppointmentsClicked)="goToAppointments()"
    (addAppointmentClicked)="openAddAppointmentForm()"
    (addPatientClicked)="openAddPatientForm()">
  </app-widgets-panel>

</div><!-- /kanban-home -->


<!-- ── FAB Menu (child component) ── -->
<app-fab-menu
  [isFabOpen]="(uiState$ | async)?.isFabOpen || false"
  [permissions]="permissions"
  (toggleFabClicked)="toggleFab()"
  (addAppointmentClicked)="openAddAppointmentForm()"
  (addPatientClicked)="openAddPatientForm()">
</app-fab-menu>

<!-- ── Add Patient Modal ── -->
<app-add-patient *ngIf="(uiState$ | async)?.showAddPatientForm" (close)="closeAddPatientForm()"
  (patientAdded)="onPatientAdded($event)"
  [prefillName]="addPatientPrefillName"
  [prefillPhone]="addPatientPrefillPhone"
  [prefillAilments]="addPatientPrefillAilments"></app-add-patient>

<!-- ── Day View Modal ── -->
<app-day-view-modal
  *ngIf="showDayViewModal && dayViewDate"
  [date]="dayViewDate"
  [appointments]="dayViewAppointments"
  [allTimeSlots]="allTimeSlots"
  [bookedSlots]="dayViewBookedSlots"
  [isLoading]="isLoadingDayView"
  [isPastDate]="isDayViewDateInPast"
  [userRole]="userRole"
  [doctorName]="dayViewDoctorName"
  (closeModal)="closeDayView()"
  (bookSlot)="onDayViewBookSlot($event)"
  (addVisit)="onDayViewAddVisit($event)"
  (rescheduleAppt)="onDayViewReschedule($event)"
  (cancelAppt)="onDayViewCancel($event)">
</app-day-view-modal>
